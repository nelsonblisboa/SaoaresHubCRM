<body class="bg-surface min-h-screen flex items-center justify-center relative overflow-hidden p-4 md:p-8">
<!-- Atmospheric Background (Emerald Sanctuary style depth) -->
<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAiLz4KPGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiMxYjZiNTEiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPgo8L3N2Zz4=')] opacity-50 z-0 pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-container/5 rounded-full blur-[100px] z-0 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-tertiary-container/5 rounded-full blur-[80px] z-0 pointer-events-none"></div>
<!-- Main Glass Card -->
<main class="relative z-10 w-full max-w-[420px]">
<div class="bg-surface-container-lowest/80 backdrop-blur-[20px] rounded-[24px] p-xl shadow-[0_8px_32px_rgba(27,107,81,0.06)] border border-surface-container-lowest/50">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-margin">
<div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-lg shadow-sm">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">
                        energy_savings_leaf
                    </span>
</div>
<h1 class="font-display-sm text-display-sm text-primary tracking-tight font-black text-center">
                    SOARES HUB
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">
                    Bem-vindo de volta ao seu santuário de vendas.
                </p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">
                        Email corporativo
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">
                            mail
                        </span>
<input autocomplete="email" class="w-full bg-surface-container text-on-surface font-body-md text-body-md rounded-xl pl-[48px] pr-md py-md border-0 focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow placeholder:text-outline/50" id="email" name="email" placeholder="nome@soares.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">
                            Senha
                        </label>
<a class="font-label-md text-label-md text-tertiary hover:text-tertiary-container transition-colors" href="#">
                            Esqueci a senha
                        </a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-outline">
                            lock
                        </span>
<input autocomplete="current-password" class="w-full bg-surface-container text-on-surface font-body-md text-body-md rounded-xl pl-[48px] pr-md py-md border-0 focus:ring-2 focus:ring-primary/40 focus:outline-none transition-shadow placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-sm bg-gradient-to-br from-primary to-primary-container text-on-primary font-label-lg text-label-lg py-[14px] px-lg rounded-xl flex items-center justify-center gap-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-md shadow-primary-container/20" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-[20px]">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Footer Note -->
<p class="font-label-md text-label-md text-on-surface-variant/70 text-center mt-xl">
                Acesso restrito a colaboradores autorizados.
            </p>
</div>
